<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rastreador GPS</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    h3 {
      margin: 10px;
    }

    #status {
      padding: 6px;
      background: #eee;
      font-size: 14px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>

<body>

<h3>📡 Rastreador GPS em Tempo Real</h3>
<div id="status">Inicializando...</div>

<div id="map"></div>

<script>
  // 🗺️ mapa inicial (Brasil)
  const map = L.map('map').setView([-15.78, -47.93], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let marker = null;

  const url = "https://bracadeiratcc-default-rtdb.firebaseio.com/gps.json";

  async function atualizarGPS() {
    try {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();

      console.log("Firebase bruto:", data);

      if (!data) {
        document.getElementById("status").innerText =
          "⚠️ Sem dados no Firebase";
        return;
      }

      // 🔥 pega TODOS os valores e evita erro de estrutura
      const valores = Object.values(data);
      const gps = valores[valores.length - 1];

      console.log("Último GPS:", gps);

      const lat = Number(gps?.lat);
      const lng = Number(gps?.lng);

      // 🚨 validação forte contra NaN
      if (!isFinite(lat) || !isFinite(lng)) {
        document.getElementById("status").innerText =
          "⚠️ GPS ainda não válido (aguardando fix)";
        return;
      }

      const pos = [lat, lng];

      if (!marker) {
        marker = L.marker(pos).addTo(map);
      } else {
        marker.setLatLng(pos);
      }

      map.setView(pos, 18);

      document.getElementById("status").innerText =
        `📍 Lat: ${lat.toFixed(6)} | Lng: ${lng.toFixed(6)}`;

    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText =
        "❌ Erro ao acessar Firebase";
    }
  }

  setInterval(atualizarGPS, 3000);
  atualizarGPS();
</script>

</body>
</html>
