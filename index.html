<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rastreador GPS</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h3 {
      margin: 10px;
    }

    #link {
      margin: 10px;
    }

    .titulo-link {
      margin: 5px;
      font-size: 14px;
      color: #ccc;
    }

    #link a {
      display: inline-block;
      padding: 8px 15px;
      background: #00c3ff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    #link a:hover {
      background: #0099cc;
    }

    #status {
      padding: 10px;
      background: #222;
      color: #00ff88;
      font-family: monospace;
      font-size: 14px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>

<body>

<h3>📡 Rastreador GPS em Tempo Real</h3>

<div id="link">
  <p class="titulo-link">🩺 Formulário Médico de Emergência</p>
  <a href="https://sites.google.com/fiec.edu.br/prenterprisestcc/in%C3%ADcio?authuser=2&pli=1" target="_blank">
    Acessar formulário
  </a>
</div>

<div id="status">Inicializando...</div>

<div id="map"></div>

<script>
  const map = L.map('map').setView([-15.78, -47.93], 5);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CartoDB'
  }).addTo(map);

  const icon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });

  let marker = null;
  let caminho = [];

  const linha = L.polyline(caminho, { color: 'red' }).addTo(map);

  const url = "https://bracadeiratcc-default-rtdb.firebaseio.com/gps.json";

  async function atualizarGPS() {
    try {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();

      if (!data) {
        document.getElementById("status").innerText =
          "⚠️ Sem dados no Firebase";
        return;
      }

      const valores = Object.values(data);
      const gps = valores[valores.length - 1];

      const lat = Number(gps?.lat);
      const lng = Number(gps?.lng);

      if (!isFinite(lat) || !isFinite(lng)) {
        document.getElementById("status").innerText =
          "⚠️ Aguardando sinal GPS válido...";
        return;
      }

      const pos = [lat, lng];

      if (!marker) {
        marker = L.marker(pos, { icon }).addTo(map);
      } else {
        marker.setLatLng(pos);
      }

      caminho.push(pos);
      linha.setLatLngs(caminho);

      map.flyTo(pos, 18, {
        animate: true,
        duration: 1.5
      });

      document.getElementById("status").innerText =
        `📍 Lat: ${lat.toFixed(6)} | Lng: ${lng.toFixed(6)}`;

    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText =
        "❌ Erro ao acessar Firebase";
    }
  }

  setInterval(atualizarGPS, 3000);
  atualizarGPS();
</script>

</body>
</html>
