<script>
  const map = L.map('map').setView([-15.78, -47.93], 5);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CartoDB'
  }).addTo(map);

  const icon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });

  let marker = null;
  let caminho = [];
  let ultimaPosicao = null;
  let ultimoEnderecoTempo = 0;
  let ultimoEndereco = "";

  const linha = L.polyline([], { color: 'red' }).addTo(map);

  const url = "https://bracadeiratcc-default-rtdb.firebaseio.com/gps/.json";

  async function buscarEndereco(lat, lng) {
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`;
      const res = await fetch(url);
      const data = await res.json();

      if (data.address) {
        const rua = data.address.road || "";
        const numero = data.address.house_number || "s/n";
        const cidade = data.address.city || data.address.town || data.address.village || "";

        return `${rua}, ${numero} - ${cidade}`;
      }

      return "Endereço aproximado não encontrado";
    } catch {
      return "Erro ao buscar endereço";
    }
  }

  async function atualizarGPS() {
    try {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();

      if (!data) {
        document.getElementById("status").innerText = "Sem dados no Firebase";
        return;
      }

      // 🔥 FILTRA DADOS VÁLIDOS
      let valores = Object.values(data).filter(p =>
        p &&
        isFinite(Number(p.lat)) &&
        isFinite(Number(p.lng))
      );

      // 🔥 ORDENA COM SEGURANÇA (timestamp opcional)
      valores.sort((a, b) => {
        const ta = a.timestamp || "";
        const tb = b.timestamp || "";
        return ta.localeCompare(tb);
      });

      // 🔥 LIMITA PARA 90 PONTOS
      const ultimos = valores.slice(-90);

      // 🔥 MONTA CAMINHO
      caminho = ultimos.map(p => [Number(p.lat), Number(p.lng)]);
      linha.setLatLngs(caminho);

      const gps = ultimos[ultimos.length - 1];

      if (!gps) {
        document.getElementById("status").innerText = "Sem dados recentes";
        return;
      }

      const lat = Number(gps.lat);
      const lng = Number(gps.lng);
      const timestamp = gps.timestamp ? gps.timestamp : "Sem horário";

      if (!isFinite(lat) || !isFinite(lng)) {
        document.getElementById("status").innerText = "Aguardando sinal GPS válido...";
        return;
      }

      const pos = [lat, lng];
      ultimaPosicao = pos;

      if (!marker) {
        marker = L.marker(pos, { icon }).addTo(map);
      } else {
        marker.setLatLng(pos);
      }

      map.flyTo(pos, 18, {
        animate: true,
        duration: 1.5
      });

      // 🔥 Atualiza endereço a cada 10s
      if (Date.now() - ultimoEnderecoTempo > 10000) {
        ultimoEndereco = await buscarEndereco(lat, lng);
        ultimoEnderecoTempo = Date.now();
      }

      document.getElementById("status").innerText =
        `Lat: ${lat.toFixed(6)} | Lng: ${lng.toFixed(6)}\n${ultimoEndereco}\nÚltima atualização: ${timestamp}`;

    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText = "Erro ao acessar Firebase";
    }
  }

  function abrirRota() {
    if (!ultimaPosicao) {
      alert("Localização ainda não disponível");
      return;
    }

    const lat = ultimaPosicao[0];
    const lng = ultimaPosicao[1];

    const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    window.open(url, "_blank");
  }

  setInterval(atualizarGPS, 3000);
  atualizarGPS();
</script>
