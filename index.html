<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rastreador GPS</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h3 {
      margin: 10px;
    }

    #status {
      padding: 10px;
      background: #222;
      color: #00ff88;
      font-family: monospace;
      font-size: 14px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>

<body>

<h3>📡 Rastreador GPS em Tempo Real</h3>
<div id="status">Inicializando...</div>

<div id="map"></div>

<script>
  // 🗺️ mapa inicial
  const map = L.map('map').setView([-15.78, -47.93], 5);

  // 🌙 mapa estilo escuro (muito mais bonito)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap & CartoDB'
  }).addTo(map);

  // 📍 ícone customizado
  const icon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });

  let marker = null;
  let caminho = [];

  // 🔴 linha do trajeto (criada uma vez só)
  const linha = L.polyline(caminho, { color: 'red' }).addTo(map);

  const url = "https://bracadeiratcc-default-rtdb.firebaseio.com/gps.json";

  async function atualizarGPS() {
    try {
      const res = await fetch(url, { cache: "no-store" });
      const data = await res.json();

      if (!data) {
        document.getElementById("status").innerText =
          "⚠️ Sem dados no Firebase";
        return;
      }

      const valores = Object.values(data);
      const gps = valores[valores.length - 1];

      const lat = Number(gps?.lat);
      const lng = Number(gps?.lng);

      if (!isFinite(lat) || !isFinite(lng)) {
        document.getElementById("status").innerText =
          "⚠️ Aguardando sinal GPS válido...";
        return;
      }

      const pos = [lat, lng];

      // 📍 marcador
      if (!marker) {
        marker = L.marker(pos, { icon }).addTo(map);
      } else {
        marker.setLatLng(pos);
      }

      // 🧭 adiciona ao trajeto
      caminho.push(pos);
      linha.setLatLngs(caminho);

      // 🎥 animação suave
      map.flyTo(pos, 18, {
        animate: true,
        duration: 1.5
      });

      // 📊 status
      document.getElementById("status").innerText =
        `📍 Lat: ${lat.toFixed(6)} | Lng: ${lng.toFixed(6)}`;

    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText =
        "❌ Erro ao acessar Firebase";
    }
  }

  setInterval(atualizarGPS, 3000);
  atualizarGPS();
</script>

</body>
</html>
